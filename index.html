function checkPw() {

function showTab(name, btn) {
  ['traceability','exec','partner'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function fetchTable(tableName, fields) {
  const params = new URLSearchParams({ pageSize: 100 });
  if (fields) fields.forEach(f => params.append('fields[]', f));
  const rows = [];
  let offset = null;
  do {
    if (offset) params.set('offset', offset);
    const res = await fetch(
      'https://api.airtable.com/v0/' + BASE_ID + '/' + encodeURIComponent(tableName) + '?' + params,
      { headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN } }
    );
    if (!res.ok) throw new Error('Airtable error ' + res.status + ' on table "' + tableName + '"');
    const data = await res.json();
    rows.push(...data.records);
    offset = data.offset || null;
  } while (offset);
  return rows;
}

const C = {
  teal:   { bg:'#E1F5EE', border:'#1D9E75', text:'#085041', mid:'#1D9E75' },
  purple: { bg:'#EEEDFE', border:'#7F77DD', text:'#3C3489', mid:'#7F77DD' },
  coral:  { bg:'#FAECE7', border:'#D85A30', text:'#712B13', mid:'#D85A30' },
  pink:   { bg:'#FBEAF0', border:'#D4537E', text:'#72243E', mid:'#D4537E' },
  gray:   { bg:'#F1EFE8', border:'#888780', text:'#5F5E5A', mid:'#888780' },
};
const OUTCOME_COLORS = [C.teal, C.purple, C.coral, C.pink];
const STATUS_STYLE = {
  'In development': { bg:'#E1F5EE', text:'#085041' },
  'In design':      { bg:'#EEEDFE', text:'#3C3489' },
  'Backlog':        { bg:'#F1EFE8', text:'#5F5E5A' },
};
function statusStyle(s) { return STATUS_STYLE[s] || { bg:'#F1EFE8', text:'#5F5E5A' }; }

let DB = {};

async function loadData() {
  showLoading('tab-traceability');
  showLoading('tab-exec');
  showLoading('tab-partner');
  try {
    const [outcomes, caps, objs, features] = await Promise.all([
      fetchTable('Outcomes',            ['Bible Loop Outcome','Description']),
      fetchTable('Capabilities',        ['Name','Related Outcomes','Learning Objectives']),
      fetchTable('Learning Objectives', ['Learning Objective','Capabilities','Outcomes']),
      fetchTable('Features',            ['Name','Status','Target Delivery','Outcomes','Core Capabilities','Learning Objectives','Problem Statement','Risks','YV Type']),
    ]);
    DB.outcomes = outcomes.map((r,i) => ({
      id:r.id, label:r.fields['Bible Loop Outcome']||'(unnamed)',
      desc:r.fields['Description']||'', color:OUTCOME_COLORS[i%OUTCOME_COLORS.length],
    }));
    DB.caps = caps.map(r => ({
      id:r.id, label:r.fields['Name']||'(unnamed)',
      outcomeIds:r.fields['Related Outcomes']||[],
      objIds:r.fields['Learning Objectives']||[],
    }));
    DB.objs = objs.map(r => ({
      id:r.id, label:r.fields['Learning Objective']||'(unnamed)',
      capIds:r.fields['Capabilities']||[],
      outcomeIds:r.fields['Outcomes']||[],
    }));
    DB.features = features.map(r => ({
      id:r.id, label:r.fields['Name']||'(unnamed)',
      status:r.fields['Status']||'',
      quarter:r.fields['Target Delivery']||'TBD',
      outcomeIds:r.fields['Outcomes']||[],
      capIds:r.fields['Core Capabilities']||[],
      objIds:r.fields['Learning Objectives']||[],
      problem:r.fields['Problem Statement']||'',
      risks:r.fields['Risks']||'',
      type:r.fields['YV Type']||'',
    }));
    renderTraceability();
    renderExec();
    renderPartner();
  } catch(e) {
    ['traceability','exec','partner'].forEach(t => {
      document.getElementById('tab-'+t).innerHTML =
        '<div class="error-box">Failed to load: ' + e.message + '</div>';
    });
  }
}

function showLoading(id) {
  document.getElementById(id).innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading from Airtable...</div>';
}

function byId(arr, id) { return arr.find(x => x.id === id); }

function getConnected(sel) {
  if (!sel) return { outcomes:new Set(), caps:new Set(), objs:new Set(), feats:new Set() };
  let outcomes=new Set(), caps=new Set(), objs=new Set(), feats=new Set();
  const addCap = cid => {
    const c = byId(DB.caps,cid); if(!c) return;
    caps.add(cid);
    c.outcomeIds.forEach(o=>outcomes.add(o));
    DB.objs.filter(l=>l.capIds.includes(cid)).forEach(l=>{
      objs.add(l.id);
      DB.features.filter(f=>f.objIds.includes(l.id)).forEach(f=>feats.add(f.id));
    });
  };
  const addObj = lid => {
    const l=byId(DB.objs,lid); if(!l) return;
    objs.add(lid);
    l.capIds.forEach(c=>addCap(c));
    DB.features.filter(f=>f.objIds.includes(lid)).forEach(f=>feats.add(f.id));
  };
  if (DB.outcomes.some(x=>x.id===sel)) {
    outcomes.add(sel);
    DB.caps.filter(c=>c.outcomeIds.includes(sel)).forEach(c=>addCap(c.id));
  } else if (DB.caps.some(x=>x.id===sel)) {
    addCap(sel);
  } else if (DB.objs.some(x=>x.id===sel)) {
    addObj(sel);
  } else if (DB.features.some(x=>x.id===sel)) {
    feats.add(sel);
    const f=byId(DB.features,sel);
    f.objIds.forEach(o=>addObj(o));
    f.capIds.forEach(c=>addCap(c));
    f.outcomeIds.forEach(o=>outcomes.add(o));
  }
  return { outcomes, caps, objs, feats };
}

let traceSel = null;
function renderTraceability() {
  const conn = getConnected(traceSel);
  const cols = [
    { title:'Outcomes',           items:DB.outcomes, color:C.teal,   nodeColor:x=>x.color,  set:conn.outcomes },
    { title:'Core capabilities',  items:DB.caps,     color:C.purple, nodeColor:()=>C.gray,  set:conn.caps     },
    { title:'Learning objectives', items:DB.objs,     color:C.coral,  nodeColor:()=>C.gray,  set:conn.objs     },
    { title:'Features',           items:DB.features, color:C.pink,   nodeColor:()=>C.gray,  set:conn.feats    },
  ];
  const colsHtml = cols.map(col => {
    const nodes = col.items.map(item => {
      const nc=col.nodeColor(item), dim=traceSel&&!col.set.has(item.id), active=traceSel===item.id;
      const qb=item.quarter?'<span class="tag" style="background:#F1EFE8;color:#5F5E5A">'+item.quarter+'</span>':'';
      return '<div class="trace-node'+(active?' active':'')+(dim?' dimmed':'')+'" style="background:'+nc.bg+';border-color:'+(dim?nc.mid+'44':nc.border)+';color:'+nc.text+';'+(active?'box-shadow:0 0 0 2.5px '+nc.border+'50':'')+'" onclick="traceClick(\''+item.id+'\')">'+item.label+' '+qb+'</div>';
    }).join('');
    return '<div class="trace-col"><div class="trace-col-header" style="background:'+col.color.bg+';border-color:'+col.color.border+';color:'+col.color.text+'">'+col.title+'</div><div class="trace-col-body" style="border-color:'+col.color.border+'">'+nodes+'</div></div>';
  }).join('');
  const countHtml = traceSel
    ? '<div class="trace-count">'+conn.outcomes.size+' outcomes &middot; '+conn.caps.size+' capabilities &middot; '+conn.objs.size+' objectives &middot; '+conn.feats.size+' features</div>' : '';
  document.getElementById('tab-traceability').innerHTML =
    '<div style="font-size:11px;color:#888780;margin-bottom:12px;text-align:center">Click any node to trace connections. Click again to reset.</div><div class="trace-grid">'+colsHtml+'</div>'+countHtml;
}
function traceClick(id) { traceSel = traceSel===id?null:id; renderTraceability(); }

let execSelOutcome=null, execSelFeature=null;
function renderExec() {
  const quarters=[...new Set(DB.features.map(f=>f.quarter).filter(Boolean))].sort();
  const visF=DB.features.filter(f=>!execSelOutcome||f.outcomeIds.includes(execSelOutcome));

  }).join('');
  const timelineHtml=quarters.map(q=>{
    const qf=visF.filter(f=>f.quarter===q);
    const cards=qf.length===0
      ? '<span style="font-size:11px;color:#b4b2a9;padding-top:8px">No features match this outcome</span>'
      : qf.map(f=>{
          const ss=statusStyle(f.status);
          const dots=f.outcomeIds.map(oid=>{const o=byId(DB.outcomes,oid);return o?'<span class="dot" style="background:'+o.color.mid+'" title="'+o.label+'"></span>':''}).join('');
          return '<div class="feature-card'+(execSelFeature===f.id?' selected':'')+'" onclick="execFeatureClick(\''+f.id+'\')"><h4>'+f.label+'</h4><div class="meta"><span class="tag" style="background:'+ss.bg+';color:'+ss.text+'">'+f.status+'</span>'+dots+'</div></div>';
        }).join('');
    return '<div class="timeline-row"><div class="q-label">'+q+'</div><div class="q-features">'+cards+'</div></div>';
  }).join('');
  let detailHtml='';
  if (execSelFeature) {
    const f=byId(DB.features,execSelFeature);
    if(f){
      const ss=statusStyle(f.status);
      const op=f.outcomeIds.map(oid=>{const o=byId(DB.outcomes,oid);return o?'<span class="pill" style="background:'+o.color.bg+';color:'+o.color.text+';border:1px solid '+o.color.border+'">'+o.label+'</span>':''}).join('');
      detailHtml='<div class="detail-panel"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h3>'+f.label+'</h3><span class="tag" style="background:'+ss.bg+';color:'+ss.text+';margin-left:8px">'+f.status+'</span></div>'+(f.problem?'<div style="font-size:12px;color:#444441;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:#fff;border:1px solid #e0dfd8;border-radius:6px">'+f.problem+'</div>':'')+'<div class="detail-section"><div class="label">Outcomes</div><div class="items">'+op+'</div></div></div>';
    }

  const fn=execSelOutcome?'<span style="color:'+byId(DB.outcomes,execSelOutcome)?.color.mid+'"> &middot; filtered by "'+byId(DB.outcomes,execSelOutcome)?.label+'"</span>':'';
  document.getElementById('tab-exec').innerHTML=
    '<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#888780;margin-bottom:8px">Strategic outcomes</div><div class="outcome-row">'+outcomeCards+'</div><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#888780;margin-bottom:10px">Feature timeline'+fn+'</div>'+timelineHtml+detailHtml+'<div style="margin-top:18px;display:flex;gap:12px;flex-wrap:wrap">'+Object.entries(STATUS_STYLE).map(([s,c])=>'<div style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:'+c.bg+';border:1px solid '+c.text+';display:inline-block"></span><span style="font-size:11px;color:#888780">'+s+'</span></div>').join('')+'</div>';
}
function execOutcomeClick(id){execSelOutcome=execSelOutcome===id?null:id;execSelFeature=null;renderExec();}
function execFeatureClick(id){execSelFeature=execSelFeature===id?null:id;renderExec();}

let partnerSel=null, partnerLayer='outcomes';
function renderPartner(){
  const quarters=[...new Set(DB.features.map(f=>f.quarter).filter(Boolean))].sort();
  const layerBtns=['outcomes','capabilities','objectives'].map(l=>'<button class="layer-btn'+(partnerLayer===l?' active':'')+'" onclick="partnerLayer=\''+l+'\';renderPartner()">'+(l==='outcomes'?'Outcomes':l==='capabilities'?'+ Capabilities':'+ Objectives')+'</button>').join('');

  if(partnerLayer==='outcomes'){
    stratHtml='<div class="outcome-row">'+DB.outcomes.map(o=>'<div class="outcome-card" style="background:'+o.color.bg+';border-color:'+o.color.border+';cursor:default"><h3 style="color:'+o.color.text+'">'+o.label+'</h3><p style="color:'+o.color.text+'">'+o.desc+'</p></div>').join('')+'</div>';
  } else {
    stratHtml=DB.outcomes.map(o=>{
      const oCaps=DB.caps.filter(c=>c.outcomeIds.includes(o.id));

        const objsHtml=partnerLayer==='objectives'?'<ul style="margin:4px 0 0;padding-left:14px">'+DB.objs.filter(l=>l.capIds.includes(c.id)).map(l=>'<li style="font-size:10.5px;color:#5F5E5A;line-height:1.5">'+l.label+'</li>').join('')+'</ul>':'';

      const ss=statusStyle(f.status);
      const uf=!['infrastructure','backend'].some(k=>(f.type||'').toLowerCase().includes(k));

    if(f){
      const ss=statusStyle(f.status);
      const op=f.outcomeIds.map(oid=>{const o=byId(DB.outcomes,oid);return o?'<span class="pill" style="background:'+o.color.bg+';color:'+o.color.text+';border:1px solid '+o.color.border+'">'+o.label+'</span>':''}).join('');
      const cp=f.capIds.map(cid=>{const c=byId(DB.caps,cid);return c?'<span class="pill" style="background:#F1EFE8;color:#5F5E5A;border:1px solid #888780">'+c.label+'</span>':''}).join('');
      const lp=f.objIds.map(lid=>{const l=byId(DB.objs,lid);return l?'<span class="pill" style="background:#F1EFE8;color:#5F5E5A;border:1px solid #888780">'+l.label+'</span>':''}).join('');
      detailHtml='<div class="detail-panel"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h3>'+f.label+'</h3><span class="tag" style="background:'+ss.bg+';color:'+ss.text+';margin-left:8px">'+f.status+'</span></div>'+(f.problem?'<div style="font-size:12px;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:#fff;border:1px solid #e0dfd8;border-radius:6px;color:#444441">'+f.problem+'</div>':'')+(f.risks?'<div style="font-size:12px;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:#FAECE7;border:1px solid #F5C4B3;border-radius:6px;color:#712B13"><strong>Risks:</strong> '+f.risks+'</div>':'')+'<div class="detail-section"><div class="label">Outcomes</div><div class="items">'+op+'</div></div><div class="detail-section"><div class="label">Core capabilities</div><div class="items">'+cp+'</div></div><div class="detail-section"><div class="label">Learning objectives</div><div class="items">'+lp+'</div></div></div>';
    }
  }
  document.getElementById('tab-partner').innerHTML=
    '<div class="card" style="margin-bottom:18px"><div style="font-size:13px;font-weight:500;margin-bottom:4px">Bible Loop — partner roadmap</div><div style="font-size:12px;color:#888780;line-height:1.5">This view shows how planned features connect to the outcomes and learning goals we\'re building toward together. Use the layer toggle to explore the strategic logic, and click any feature for detail.</div></div><div class="layer-toggle"><span>Show strategy layer:</span>'+layerBtns+'</div>'+stratHtml+'<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#888780;margin-bottom:10px;margin-top:4px">Delivery timeline</div>'+timelineHtml+detailHtml;
}
function partnerFeatureClick(id){partnerSel=partnerSel===id?null:id;renderPartner();}

window.checkPw = checkPw;
window.showTab = showTab;
window.traceClick = traceClick;
window.execOutcomeClick = execOutcomeClick;
window.execFeatureClick = execFeatureClick;
window.partnerFeatureClick = partnerFeatureClick;
window.partnerLayer = 'outcomes';
<\/script>
</body>
</html>`;

export default function App() {
  const [done, setDone] = useState(false);

  const download = () => {
    const blob = new Blob([HTML], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "index.html";
    a.click();
    URL.revokeObjectURL(url);
    setDone(true);
  };

  return (
    <div style={{ padding: "32px 24px", textAlign: "center", fontFamily: "var(--font-sans)" }}>
      <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 6 }}>
        Bible Loop Roadmap App
      </div>
      <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 24, lineHeight: 1.5 }}>
        Downloads <code style={{ fontSize: 11, background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3 }}>index.html</code> — open it and replace <code style={{ fontSize: 11, background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3 }}>YOUR_TOKEN_HERE</code> and <code style={{ fontSize: 11, background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3 }}>YOUR_PASSWORD_HERE</code> before uploading to GitHub.
      </div>
      <button onClick={download} style={{
        padding: "10px 24px", borderRadius: 8, border: "none",
        background: "#1D9E75", color: "#fff", fontSize: 13, fontWeight: 500,
        cursor: "pointer", marginBottom: 12,
      }}>
        Download index.html
      </button>
      {done && (
        <div style={{ fontSize: 12, color: "#1D9E75", marginTop: 8 }}>
          Downloaded. Open the file, add your token and password, then upload to GitHub.
        </div>
      )}
    </div>
  );
}
